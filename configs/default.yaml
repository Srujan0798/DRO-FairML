model:
  hidden_dims:
  - 128
  - 64
  dropout: 0.1
training:
  lr_theta: 0.001
  lr_lambda: 0.005
  lr_p: 0.005
  lambda_max: 2.0
  tau: 100.0
  beta: 5.0
  k: 5
  gamma: 0.0
  K_inner: 10
  epochs: 60
  weight_decay: 0.0001
  tau_warmup_epochs: 5
corruption:
  alpha:
  - 0.0
  - 0.1
  - 0.2
  - 0.3
  - 0.4
  epsilon: 0.1
  mode: adversarial
  coordinated: true
